<main>
        <section class="page-header">
            <div class="container">
                <h1>Agenda de Actividades / 活動日程</h1>
            </div>
        </section>

        <div class="container">
            <div class="lang-tabs">
                <button class="tab-btn active" data-tab="es">
                    <i class="fas fa-globe"></i> Español
                </button>
                <button class="tab-btn" data-tab="zh">
                    <i class="fas fa-language"></i> 中文 (Chino)
                </button>
            </div>
        </div>

        <div id="es" class="tab-content active">
            <section class="container past-events">
                <h2 class="section-title-left"><i class="fas fa-history"></i> Memoria de Actividades</h2>
                
                <div class="cards-grid" id="grid-es"></div>

                <div class="contenedor-ver-mas">
                    <button id="btn-ver-mas-es" class="btn-cargar-mas" style="display: none;">Cargar más actividades <i class="fas fa-plus-circle"></i></button>
                </div>

            </section>
        </div>

        </main>

    <script src="js/main.js"></script>
    
    <script src="js/datos-actividades.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const contenedorGrid = document.getElementById('grid-es');
            const btnVerMas = document.getElementById('btn-ver-mas-es');
            
            let tarjetasVisibles = 0; 
            const tarjetasPorClic = 6;

            // Función para dibujar las tarjetas en el HTML
            function renderizarTarjetas() {
                const limite = tarjetasVisibles + tarjetasPorClic;
                
                for (let i = tarjetasVisibles; i < limite && i < listaActividades.length; i++) {
                    const actividad = listaActividades[i];
                    
                    // Creamos el código HTML de cada tarjeta dinámicamente
                    const tarjetaHTML = `
                        <div class="card-item" style="animation: fadeIn 0.5s ease;">
                            <a href="${actividad.enlace}">
                                <h3>${actividad.titulo}</h3>
                                <p>${actividad.descripcion}</p>
                                <span class="btn-ver">Leer más <i class="fas fa-arrow-right"></i></span>
                            </a>
                        </div>
                    `;
                    
                    // Lo inyectamos en el contenedor
                    contenedorGrid.innerHTML += tarjetaHTML;
                }
                
                tarjetasVisibles = limite;

                // Mostramos u ocultamos el botón dependiendo de si quedan artículos
                if (tarjetasVisibles < listaActividades.length) {
                    btnVerMas.style.display = 'inline-block';
                } else {
                    btnVerMas.style.display = 'none';
                }
            }

            // Pintar las primeras tarjetas al cargar la página
            renderizarTarjetas();

            // Asignar la función al botón
            btnVerMas.addEventListener('click', renderizarTarjetas);
        });
    </script>
